<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aktix – Passkey Demo</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0ea5e9" />
<link rel="apple-touch-icon" href="/icons/pwa-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<main class="card">
<h1>Aktix – Passkeys</h1>


<section class="row">
<input id="username" placeholder="username (e.g. keld)" autocomplete="username webauthn" />
<input id="displayName" placeholder="display name (optional)" />
</section>


<section class="row">
<button id="btn-register">Register Passkey</button>
<button id="btn-login">Sign in</button>
</section>


<pre id="log"></pre>


<section class="row muted" id="me"></section>
</main>


<script src="/app.js" defer></script>
<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
